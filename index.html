      --accent:#0f766e;--accent-dim:#0f766e1f;--text-primary:#0f172a;--text-secondary:#475569;
      --text-muted:#94a3b8;--border:#dbe3ee;--border-subtle:#e7edf5;--amber:#d97706;--red:#dc2626;
      --green:#059669;--blue:#2563eb;--purple:#7c3aed;--font-mono:'DM Mono',monospace;--font-sans:'DM Sans',sans-serif;
      --radius-sm:4px;--radius-md:8px;--radius-lg:12px;--shadow-lg:0 8px 24px rgba(15,23,42,.08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg-base); color: var(--text-primary); font-family: var(--font-sans); height: 100vh; overflow: hidden; }
    .app-shell { height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: 62px; border-bottom: 1px solid var(--border); padding: 10px 16px; display: grid; grid-template-columns: 210px 1fr 190px; gap: 16px; align-items: center; background: var(--bg-surface); }
    .logo { font-weight: 700; font-size: 20px; letter-spacing: .3px; }
    .logo span { color: var(--accent); }
    .top-actions { display: flex; gap: 12px; justify-content: flex-end; }
    .content { flex: 1; min-height: 0; display: grid; grid-template-columns: 280px minmax(420px, 1fr) 500px; overflow: hidden; }
    .panel { border-right: 1px solid var(--border-subtle); background: var(--bg-surface); min-height: 0; overflow: auto; }
    .panel:last-child { border-right: none; border-left: 1px solid var(--border-subtle); }
    .section-title { margin: 18px 16px 8px; font: 500 12px var(--font-mono); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
    #folders, #pipelineStages { margin: 0 8px; }
    .view-toggle { margin: 14px 12px 6px; display:flex; gap:8px; }
    .action-grid { margin: 8px 12px 0; display: grid; gap: 8px; }
    .insights-card { margin: 12px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px; }
    .insight-row { display:flex; justify-content: space-between; margin-top: 6px; font-size: 13px; }
    #stageChart { margin: 8px 12px 12px; height: 180px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-elevated); }
    #emailListContainer, #kanbanView { height: calc(100% - 12px); }
    #emailList { height: 100%; }
    .email-item { padding: 10px 14px; border-bottom: 1px solid var(--border-subtle); cursor: pointer; }
    .email-item:hover { background: var(--bg-hover); }
    .email-top { display: flex; justify-content: space-between; font-size: 13px; }
    .email-from { font-weight: 600; }
    .email-date { color: var(--text-secondary); font-family: var(--font-mono); }
    .email-subject { margin-top: 4px; font-weight: 500; }
    .email-snippet { font-size: 13px; color: var(--text-secondary); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge { display:inline-block; background: var(--accent-dim); color: var(--accent); padding: 2px 6px; border-radius: 999px; font-size: 11px; margin-top: 6px; }
    .unread-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 6px; }
    #kanbanView { display:none; overflow:auto; padding: 12px; }
    .kanban-row { display:flex; gap:12px; min-height: 100%; }
    .kanban-col { min-width: 220px; max-width: 220px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); display:flex; flex-direction:column; }
    .kanban-head { padding:10px; border-bottom:1px solid var(--border); font:500 12px var(--font-mono); color:var(--text-secondary); }
    .kanban-body { padding:8px; min-height:120px; }
    .deal-card { background: var(--bg-surface); border:1px solid var(--border); border-radius: var(--radius-md); padding:10px; margin-bottom:8px; cursor:grab; }
    .deal-card:hover { border-color: var(--accent); }
    .deal-value { color: var(--accent); font-family: var(--font-mono); font-size: 12px; margin-top: 6px; }
    .right-header { padding: 14px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .empty-state { padding: 36px 26px; text-align:center; color: var(--text-secondary); }
    .thread-wrap { padding: 14px; }
    .thread-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .thread-meta { border: 1px solid var(--border); background: var(--bg-elevated); border-radius: var(--radius-md); padding: 10px; margin-bottom: 10px; font-size: 13px; color: var(--text-secondary); }
    .thread-meta-row { display:flex; justify-content:space-between; margin-bottom:4px; }
    .thread-message { border:1px solid var(--border); background:var(--bg-elevated); border-radius:var(--radius-md); padding:10px; margin-bottom:10px; }
    .thread-message-head { display:flex; justify-content:space-between; margin-bottom:8px; font-size:12px; color:var(--text-secondary); }
    .reply-composer { border:1px solid var(--border); background:var(--bg-surface); border-radius:var(--radius-md); padding:10px; margin-top:10px; }

    .activity-chip { display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--text-secondary); background:var(--bg-elevated); border:1px solid var(--border); border-radius:999px; padding:2px 8px; margin-top:6px; margin-right:4px; }
    .timeline-filter-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .timeline-item { border:1px solid var(--border); background:var(--bg-elevated); border-radius:var(--radius-md); padding:10px; margin-bottom:8px; }
    .timeline-head { display:flex; justify-content:space-between; font-size:12px; color:var(--text-secondary); margin-bottom:4px; }
    .composer-hint { font-size:12px; color:var(--text-secondary); margin-top:8px; }
    .smart-preview { margin-top:10px; border:1px dashed var(--border); border-radius:var(--radius-md); padding:8px; font-size:12px; color:var(--text-secondary); background:var(--bg-elevated); }
    .linkified { color: var(--blue); text-decoration: underline; }
    .reply-title { font: 500 12px var(--font-mono); color: var(--text-secondary); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
    #detailTabs { height: calc(100% - 58px); }
    .dx-list, .dx-popup-content, .dx-scrollable-content { background: var(--bg-surface)!important; }
    .dx-texteditor { background: var(--bg-elevated)!important; border-color: var(--border)!important; }
    .dx-button-mode-contained.dx-button-success { background-color: var(--accent)!important; color: var(--bg-base)!important; }
    .compose-actions { display:flex; gap:8px; margin-top:12px; position: sticky; bottom: 0; background: linear-gradient(to top, var(--bg-surface) 75%, transparent); padding-top: 8px; }
    .timeline-filter-row { position: sticky; top: 0; z-index: 2; background: var(--bg-surface); padding-bottom: 6px; }
    #emailListContainer, #detailTabs { min-height: 0; }

    @media (max-width: 1440px) {
      .content { grid-template-columns: 260px minmax(380px, 1fr) 430px; }
    }

    @media (max-width: 1200px) {
      .topbar { grid-template-columns: 180px 1fr 160px; gap: 12px; }
      .content { grid-template-columns: 240px minmax(340px, 1fr) 340px; }
    }

    @media (max-width: 992px) {
      .topbar { grid-template-columns: 1fr auto; grid-template-areas: "logo actions" "search search"; height: auto; }
      .logo { grid-area: logo; }
      #searchBox { grid-area: search; min-width: 0; }
      .top-actions { grid-area: actions; gap: 8px; }
      .content { grid-template-columns: 88px minmax(0, 1fr) 320px; }
      .content > .panel:first-child { padding-top: 6px; }
      .content > .panel:first-child .section-title,
      .content > .panel:first-child .insights-card,
      .content > .panel:first-child #stageChart { display: none; }
      .content > .panel:first-child .view-toggle,
      .content > .panel:first-child .action-grid { margin: 8px 6px 0; }
      .content > .panel:first-child .dx-button { width: 100%; min-width: 0; }
      .content > .panel:first-child .dx-button-content { padding-left: 6px; padding-right: 6px; }
      .content > .panel:first-child .dx-button-text { display: none; }
      .right-header { position: sticky; top: 0; z-index: 3; background: var(--bg-surface); }
    }

    @media (max-width: 768px) {
      body { height: auto; min-height: 100vh; overflow: auto; }
      .app-shell { min-height: 100vh; height: auto; }
      .topbar { position: sticky; top: 0; z-index: 10; }
      .content {
        grid-template-columns: 88px minmax(0, 1fr);
        grid-template-rows: minmax(380px, 1fr) auto;
        overflow: visible;
      }
      .content > .panel:nth-child(3) {
        grid-column: 1 / -1;
        border-left: none;
        border-top: 1px solid var(--border-subtle);
        max-height: none;
      }
      #detailTabs { height: auto; min-height: 420px; }
    }

    @media (max-width: 560px) {
      .content { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
      .content > .panel { border-right: none; border-bottom: 1px solid var(--border-subtle); }
      .content > .panel:first-child {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        padding: 8px;
      }
      .content > .panel:first-child #folders,
      .content > .panel:first-child #pipelineStages { grid-column: 1 / -1; }
      .content > .panel:first-child .view-toggle,
      .content > .panel:first-child .action-grid { display: contents; }
      .content > .panel:first-child .dx-button-text { display: inline; }
    }
  </style>
</head>

function getStageSummary(){
  return AppState.pipelineStages.map(function(stage){
    var deals = AppState.deals.filter(function(d){ return d.stage===stage; });
    var value = deals.reduce(function(sum,d){ return sum + d.value; },0);
    return { stage:stage, count:deals.length, value:value };
  });
}
function getDealHealthRows(){
  return AppState.deals.map(function(d){

      title:d.title,
      stage:d.stage,
      value:d.value,
      probability:d.probability,
      velocity:d.days + ' days',
      notes:d.notes
    };
  });
}

function normalizeDateValue(v){
  if(!v){ return null; }
  if(v instanceof Date){ return v; }
  var parsed = new Date(String(v).replace(' ','T'));
  return isNaN(parsed.getTime()) ? null : parsed;
}
function formatRelativeFromNow(v){
  var d = normalizeDateValue(v);
  if(!d){ return '—'; }
  var diff = Math.max(0, Date.now() - d.getTime());
  var days = Math.floor(diff / (1000*60*60*24));
  if(days===0){ return 'today'; }
  if(days===1){ return '1d ago'; }
  return days + 'd ago';
}
function getDealEmailStats(dealId){
  var emails = AppState.emails.filter(function(e){ return e.dealId===dealId; });
  if(!emails.length){ return { count:0, lastLabel:'No email yet', direction:'none', stale:true }; }
  var sorted = emails.slice().sort(function(a,b){
    var ad = normalizeDateValue(a.date); var bd = normalizeDateValue(b.date);
    return (bd?bd.getTime():0) - (ad?ad.getTime():0);
  });
  var latest = sorted[0];
  var latestDate = normalizeDateValue(latest.date);
  var stale = latestDate ? ((Date.now()-latestDate.getTime())/(1000*60*60*24) > 14) : false;
  return { count:emails.length, lastLabel:latest.date || '—', relative:formatRelativeFromNow(latest.date), direction:latest.folder==='sent'?'sent':'received', stale:stale };
}
function getDealTimelineEvents(dealId){
  var deal = AppState.deals.find(function(d){ return d.id===dealId; });
  if(!deal){ return []; }
  var emailEvents = AppState.emails.filter(function(e){ return e.dealId===dealId; }).map(function(e){
    return { type: e.folder==='sent' ? 'sent' : 'received', title:e.subject, body:e.snippet || e.body || '', at:e.date, actor:e.from };
  });
  var noteEvents = (deal.notes||[]).map(function(n,idx){
    var base = normalizeDateValue('2026-03-18 12:00') || new Date();
    var pseudo = new Date(base.getTime() - idx*1000*60*60*6);
    return { type:'internal note', title:'Deal note', body:n, at:pseudo.toISOString(), actor:'Sales team' };
  });
  var stageEvent = { type:'status change', title:'Deal in '+deal.stage, body:'Current stage is '+deal.stage+'.', at:new Date().toISOString(), actor:'System' };
  return emailEvents.concat(noteEvents).concat([stageEvent]).sort(function(a,b){
    var ad=normalizeDateValue(a.at); var bd=normalizeDateValue(b.at);
    return (bd?bd.getTime():0)-(ad?ad.getTime():0);
  });
}
function renderTimeline(filter){
  var deal = AppState.deals.find(function(d){ return d.id===AppState.selectedDealId; });
  if(!deal){ return '<div class="empty-state">No deal selected.</div>'; }
  var events = getDealTimelineEvents(deal.id);
  var f = filter || AppState.timelineFilter || 'all';
  var filtered = f==='all' ? events : events.filter(function(ev){ return ev.type===f; });
  var filters = ['all','sent','received','internal note','status change'];
  var buttons = '<div class="timeline-filter-row">'+filters.map(function(x){ return '<div id="flt-'+x.replace(/\s/g,'-')+'"></div>'; }).join('')+'</div>';
  if(!filtered.length){ return buttons + '<div class="empty-state">No '+f+' events yet.</div>'; }
  var rows = filtered.map(function(ev){
    var dateValue = normalizeDateValue(ev.at);
    var displayDate = dateValue ? dateValue.toISOString().slice(0,16).replace('T',' ') : '—';
    return '<div class="timeline-item"><div class="timeline-head"><strong>'+ev.type+'</strong><span>'+displayDate+'</span></div><div><strong>'+ev.title+'</strong></div><div>'+ev.body+'</div><div class="composer-hint">'+ev.actor+'</div></div>';
  }).join('');
  return buttons + rows;
}
function buildSmartPreview(raw){
  var txt = raw || '';
  var subject = (txt.match(/subject:\s*(.*)/i)||[])[1] || '';
  var from = (txt.match(/from:\s*(.*)/i)||[])[1] || '';
  var date = (txt.match(/date:\s*(.*)/i)||[])[1] || '';
  var links = (txt.match(/https?:\/\/[^\s]+/g)||[]).slice(0,3);
  var emails = (txt.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/ig)||[]).slice(0,3);
  var phones = (txt.match(/(?:\+?\d[\d\s().-]{7,}\d)/g)||[]).slice(0,2);
  var quoted = /\n>\s?/m.test(txt) || /-----Original Message-----/i.test(txt);
  return { subject:subject, from:from, date:date, links:links, emails:emails, phones:phones, quoted:quoted };
}

function renderKanban(){
  var $k = $('#kanbanView').empty();
  var row = $('<div class="kanban-row"></div>').appendTo($k);
  AppState.pipelineStages.forEach(function(stage){
    var col = $('<div class="kanban-col"><div class="kanban-head">'+stage+'</div><div class="kanban-body" id="stage-'+stage+'"></div></div>');
    row.append(col);
    var deals = AppState.deals.filter(function(d){return d.stage===stage;});
    var body = col.find('.kanban-body');
    if(!deals.length){ body.append('<div class="empty-state">No deals</div>'); }
    deals.forEach(function(d){
      var stats = getDealEmailStats(d.id);
      var chips = '<div class="activity-chip">Last email: '+(stats.relative||'—')+'</div>'+
        '<div class="activity-chip">'+(stats.direction==='sent'?'Sent':'Received')+'</div>'+
        '<div class="activity-chip">'+stats.count+' emails</div>'+
        (stats.stale?'<div class="activity-chip" style="color:var(--amber);border-color:var(--amber)">No touch 14d+</div>':'');

      if(hasContent && !window.__forceCloseAddEmail){
        e.cancel = true;
        DevExpress.ui.dialog.confirm('You have unsaved email content. Discard or keep editing?','Discard draft?').done(function(ok){
          if(ok){
            sessionStorage.removeItem(AppState.addEmailDraftKey);
            window.__forceCloseAddEmail = true;
            $('#composePopup').dxPopup('instance').hide();
            window.__forceCloseAddEmail = false;
          }
        });
      }
    },
    contentTemplate:function(c){
      c.append('<div id="emailModeField"></div><div id="senderField" style="margin-top:10px"></div><div id="subField" style="margin-top:10px"></div><div id="rawBodyField" style="margin-top:10px"></div><div id="smartPreview"></div><div id="linkDeal" style="margin-top:10px"></div><div class="composer-hint">Shortcut: Ctrl/Cmd + Enter to save, Esc to close.</div><div class="compose-actions"><div id="cancelEmailBtn"></div><div id="saveEmailBtn"></div></div>');
      var draft = JSON.parse(sessionStorage.getItem(AppState.addEmailDraftKey)||'{}');
      function saveDraft(){
        var payload = {
          mode: $('#emailModeField').dxRadioGroup('instance').option('value'),
          sender: $('#senderField').dxTextBox('instance').option('value') || '',
          subject: $('#subField').dxTextBox('instance').option('value') || '',
          rawBody: $('#rawBodyField').dxTextArea('instance').option('value') || '',
          dealId: $('#linkDeal').dxSelectBox('instance').option('value') || null
        };
        sessionStorage.setItem(AppState.addEmailDraftKey, JSON.stringify(payload));
        var smart = buildSmartPreview(payload.rawBody);
        var html = '<div class="smart-preview"><div><strong>Detected</strong></div>'+
          '<div>Subject: '+(smart.subject||'—')+'</div><div>Sender: '+(smart.from||'—')+'</div><div>Date: '+(smart.date||'—')+'</div>'+
          '<div>Quoted thread: '+(smart.quoted?'Yes':'No')+'</div>'+
          '<div>Links: '+(smart.links.join(', ')||'—')+'</div>'+
          '<div>Emails: '+(smart.emails.join(', ')||'—')+'</div>'+
          '<div>Phones: '+(smart.phones.join(', ')||'—')+'</div></div>';
        $('#smartPreview').html(html);
      }
      $('#emailModeField').dxRadioGroup({
        layout:'horizontal',
        items:[{id:'raw',label:'Raw email body'},{id:'note',label:'Internal note/comment'}],
        displayExpr:'label',
        valueExpr:'id',
        value:draft.mode||'raw',
        onValueChanged:saveDraft
      });
      $('#senderField').dxTextBox({label:'Sender',labelMode:'static',placeholder:'name@company.com',value:draft.sender||'',onValueChanged:saveDraft});
      $('#subField').dxTextBox({label:'Subject',labelMode:'static',placeholder:'Subject',value:draft.subject||'',onValueChanged:saveDraft});
      $('#rawBodyField').dxTextArea({
        height:220,
        autoResizeEnabled:true,
        label:'Paste or type the email here. We\'ll keep formatting and link it to this deal.',
        labelMode:'static',
        value:draft.rawBody||'',
        onValueChanged:saveDraft,
        onEnterKey:function(ev){
          if(ev.event && (ev.event.ctrlKey || ev.event.metaKey)){ $('#saveEmailBtn').dxButton('instance').option('onClick')(); }
        }
      });
      $('#linkDeal').dxSelectBox({dataSource:AppState.deals,displayExpr:'title',valueExpr:'id',placeholder:'Link to deal (optional)',value:draft.dealId||null,onValueChanged:saveDraft});
      $('#cancelEmailBtn').dxButton({text:'Cancel',stylingMode:'outlined',onClick:function(){ $('#composePopup').dxPopup('instance').hide(); }});
      $('#saveEmailBtn').dxButton({text:'Save Email',type:'success',onClick:function(){
        var sender = $('#senderField').dxTextBox('instance').option('value') || 'Unknown sender';
        var subject = $('#subField').dxTextBox('instance').option('value') || '(No subject)';
        var body = $('#rawBodyField').dxTextArea('instance').option('value') || '';
        var mode = $('#emailModeField').dxRadioGroup('instance').option('value');
        var dealId = $('#linkDeal').dxSelectBox('instance').option('value') || null;
        if(!body.trim()){ notify('Please add email content before saving','warning'); return; }
        AppState.emails.unshift({
          id:Date.now(), folder:'inbox', from:sender, to:'sales@pipemailer.local', cc:'', subject:subject,
          snippet:body.slice(0,90), date:new Date().toISOString().slice(0,16).replace('T',' '), isRead:false, isStarred:false,
          dealId:dealId, body:body, thread:[{from:sender,at:new Date().toISOString().slice(0,16).replace('T',' '),body:body}], mode:mode
        });
        sessionStorage.removeItem(AppState.addEmailDraftKey);
        renderEmailList(); renderKanban(); refreshInsights();
        notify(mode==='note'?'Internal note saved':'Email captured');
        $('#composePopup').dxPopup('instance').hide();
      }});
      saveDraft();
      c.on('keydown', function(ev){
        if((ev.ctrlKey || ev.metaKey) && ev.key==='Enter'){ $('#saveEmailBtn').dxButton('instance').option('onClick')(); }
      });
    }
  });
  $('#notePopup').dxPopup({title:'Add deal note',width:420,height:280,showCloseButton:true,contentTemplate:function(c){
    c.append('<div id="noteArea"></div><div id="saveNote" style="margin-top:10px"></div>');
    $('#noteArea').dxTextArea({height:120,placeholder:'Write note'});
    $('#saveNote').dxButton({text:'Save note',type:'success',onClick:function(e){
      var note = $('#noteArea').dxTextArea('instance').option('value');
      if(AppState.selectedDealId && note){e.component.option('disabled',true);setTimeout(function(){AppState.addDealNote(AppState.selectedDealId,note);notify('Note saved');$('#notePopup').dxPopup('instance').hide();renderRightPanel();e.component.option('disabled',false);},700);}
    }});
  }});
  $('#dealPopup').dxPopup({title:'Create deal',width:520,height:470,showCloseButton:true,contentTemplate:function(c){
    c.append('<div id="dealForm"></div><div id="saveDeal" style="margin-top:10px"></div>');
    var formData = { title:'', contact:'', value:15000, stage:'Leads', probability:25, tags:[] };
    $('#dealForm').dxForm({
      formData:formData,
      labelMode:'floating',
      items:[
        { dataField:'title', editorType:'dxTextBox', isRequired:true },
        { dataField:'contact', editorType:'dxTextBox', isRequired:true },
        { dataField:'value', editorType:'dxNumberBox', editorOptions:{ min:1000, format:'#,##0' } },
        { dataField:'stage', editorType:'dxSelectBox', editorOptions:{ dataSource:AppState.pipelineStages } },
        { dataField:'probability', editorType:'dxSlider', editorOptions:{ min:5, max:100, showRange:true } },
        { dataField:'tags', editorType:'dxTagBox', editorOptions:{ dataSource:['Expansion','Renewal','Risk','Urgent','Legal'], showSelectionControls:true } }
      ]
    });
    $('#saveDeal').dxButton({text:'Save deal',type:'success',onClick:function(e){
      var form = $('#dealForm').dxForm('instance');
      var data = form.option('formData');
      if(!data.title || !data.contact){ notify('Deal title and contact are required','warning'); return; }
      e.component.option('disabled',true);
      setTimeout(function(){
        var newId = Date.now();
        AppState.deals.unshift({
          id:newId,title:data.title,contact:data.contact,value:Number(data.value)||10000,stage:data.stage||'Leads',
          probability:Number(data.probability)||20,days:1,notes:['Deal created from quick action','Tags: '+((data.tags||[]).join(', ')||'none')]
        });
        refreshInsights();
        renderKanban();
        renderStageChart();
        renderRightPanel();
        $('#dealPopup').dxPopup('instance').hide();
        notify('New deal added');
        e.component.option('disabled',false);
      },500);
    }});
  }});
  $('#linkBtn').dxButton({text:'Link Email',stylingMode:'text',onClick:function(){ $('#composePopup').dxPopup('instance').show(); }});
  renderEmailList();
  renderRightPanel();
  refreshInsights();
  renderStageChart();
});
</script>
</body>
</html>
