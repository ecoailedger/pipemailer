<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PipeMailer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/23.2.5/css/dx.material.blue.light.min.css">
  <style>
    :root {
      --bg-base:#f6f8fb;--bg-surface:#ffffff;--bg-elevated:#f8fafc;--bg-hover:#eef2f7;
      --accent:#0f766e;--accent-dim:#0f766e1f;--text-primary:#0f172a;--text-secondary:#475569;
      --text-muted:#94a3b8;--border:#dbe3ee;--border-subtle:#e7edf5;--amber:#d97706;--red:#dc2626;
      --green:#059669;--blue:#2563eb;--purple:#7c3aed;--font-mono:'DM Mono',monospace;--font-sans:'DM Sans',sans-serif;
      --radius-sm:4px;--radius-md:8px;--radius-lg:12px;--shadow-lg:0 8px 24px rgba(15,23,42,.08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg-base); color: var(--text-primary); font-family: var(--font-sans); height: 100vh; overflow: hidden; }
    .app-shell { height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: 62px; border-bottom: 1px solid var(--border); padding: 10px 16px; display: grid; grid-template-columns: 210px 1fr 190px; gap: 16px; align-items: center; background: var(--bg-surface); }
    .logo { font-weight: 700; font-size: 20px; letter-spacing: .3px; }
    .logo span { color: var(--accent); }
    .top-actions { display: flex; gap: 12px; justify-content: flex-end; }
    .content { flex: 1; min-height: 0; display: grid; grid-template-columns: 280px minmax(420px, 1fr) 500px; }
    .panel { border-right: 1px solid var(--border-subtle); background: var(--bg-surface); min-height: 0; }
    .panel:last-child { border-right: none; border-left: 1px solid var(--border-subtle); }
    .section-title { margin: 18px 16px 8px; font: 500 12px var(--font-mono); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
    #folders, #pipelineStages { margin: 0 8px; }
    .view-toggle { margin: 14px 12px 6px; display:flex; gap:8px; }
    .action-grid { margin: 8px 12px 0; display: grid; gap: 8px; }
    .insights-card { margin: 12px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px; }
    .insight-row { display:flex; justify-content: space-between; margin-top: 6px; font-size: 13px; }
    #stageChart { margin: 8px 12px 12px; height: 180px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-elevated); }
    #emailListContainer, #kanbanView { height: calc(100% - 12px); }
    #emailList { height: 100%; }
    .email-item { padding: 10px 14px; border-bottom: 1px solid var(--border-subtle); cursor: pointer; }
    .email-item:hover { background: var(--bg-hover); }
    .email-top { display: flex; justify-content: space-between; font-size: 13px; }
    .email-from { font-weight: 600; }
    .email-date { color: var(--text-secondary); font-family: var(--font-mono); }
    .email-subject { margin-top: 4px; font-weight: 500; }
    .email-snippet { font-size: 13px; color: var(--text-secondary); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge { display:inline-block; background: var(--accent-dim); color: var(--accent); padding: 2px 6px; border-radius: 999px; font-size: 11px; margin-top: 6px; }
    .unread-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 6px; }
    #kanbanView { display:none; overflow:auto; padding: 12px; }
    .kanban-row { display:flex; gap:12px; min-height: 100%; }
    .kanban-col { min-width: 220px; max-width: 220px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); display:flex; flex-direction:column; }
    .kanban-head { padding:10px; border-bottom:1px solid var(--border); font:500 12px var(--font-mono); color:var(--text-secondary); }
    .kanban-body { padding:8px; min-height:120px; }
    .deal-card { background: var(--bg-surface); border:1px solid var(--border); border-radius: var(--radius-md); padding:10px; margin-bottom:8px; cursor:grab; }
    .deal-card:hover { border-color: var(--accent); }
    .deal-value { color: var(--accent); font-family: var(--font-mono); font-size: 12px; margin-top: 6px; }
    .right-header { padding: 14px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .empty-state { padding: 36px 26px; text-align:center; color: var(--text-secondary); }
    .thread-wrap { padding: 14px; }
    .thread-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .thread-meta { border: 1px solid var(--border); background: var(--bg-elevated); border-radius: var(--radius-md); padding: 10px; margin-bottom: 10px; font-size: 13px; color: var(--text-secondary); }
    .thread-meta-row { display:flex; justify-content:space-between; margin-bottom:4px; }
    .thread-message { border:1px solid var(--border); background:var(--bg-elevated); border-radius:var(--radius-md); padding:10px; margin-bottom:10px; }
    .thread-message-head { display:flex; justify-content:space-between; margin-bottom:8px; font-size:12px; color:var(--text-secondary); }
    .reply-composer { border:1px solid var(--border); background:var(--bg-surface); border-radius:var(--radius-md); padding:10px; margin-top:10px; }
    .reply-title { font: 500 12px var(--font-mono); color: var(--text-secondary); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
    #detailTabs { height: calc(100% - 58px); }
    .dx-list, .dx-popup-content, .dx-scrollable-content { background: var(--bg-surface)!important; }
    .dx-texteditor { background: var(--bg-elevated)!important; border-color: var(--border)!important; }
    .dx-button-mode-contained.dx-button-success { background-color: var(--accent)!important; color: var(--bg-base)!important; }
  </style>
</head>

</div>

window.AppState = {
  currentView:'email',selectedEmailId:null,selectedDealId:null,selectedFolder:'inbox',rightPanelMode:'email',searchQuery:'',
  composerMode:'reply',
  emails:mockEmails,deals:mockDeals,pipelineStages:['Leads','Qualified','Proposal','Negotiation','Won','Lost'],
  selectEmail:function(id){this.selectedEmailId=id; this.rightPanelMode='email'; renderRightPanel();},
  selectDeal:function(id){this.selectedDealId=id; this.rightPanelMode='deal'; renderRightPanel();},
  moveDealToStage:function(id,stage){ var d=this.deals.find(function(x){return x.id===id}); if(d){d.stage=stage;} },
  linkEmailToDeal:function(emailId,dealId){ var e=this.emails.find(function(x){return x.id===emailId}); if(e){e.dealId=dealId;} },
  toggleEmailStar:function(emailId){
    var e=this.emails.find(function(x){return x.id===emailId});
    if(!e){ return false; }
    e.isStarred = !e.isStarred;
    return e.isStarred;
  },
  archiveEmail:function(emailId){
    var e=this.emails.find(function(x){return x.id===emailId});
    if(!e){ return false; }
    e.folder = 'archive';
    return true;
  },
  markEmailRead:function(emailId,isRead){
    var e=this.emails.find(function(x){return x.id===emailId});
    if(!e){ return false; }
    e.isRead = !!isRead;
    return true;
  },
  updateEmailDealStage:function(emailId,stage){
    var e=this.emails.find(function(x){return x.id===emailId});
    if(!e||!e.dealId){ return false; }
    var d=this.deals.find(function(x){return x.id===e.dealId});
    if(!d){ return false; }
    d.stage=stage;
    return true;
  },
  addDealNote:function(dealId,note){ var d=this.deals.find(function(x){return x.id===dealId}); if(d){d.notes.unshift(note);} }
};
function getStageSummary(){
  return AppState.pipelineStages.map(function(stage){
    var deals = AppState.deals.filter(function(d){ return d.stage===stage; });
    var value = deals.reduce(function(sum,d){ return sum + d.value; },0);
    return { stage:stage, count:deals.length, value:value };
  });
}
function getDealHealthRows(){
  return AppState.deals.map(function(d){
    return {
      id:d.id,
      title:d.title,
      stage:d.stage,
      value:d.value,
      probability:d.probability,
      velocity:d.days + ' days',
      notes:d.notes
    };
  });
}
function notify(msg,type){ $('#toast').dxToast({message:msg,type:type||'success',displayTime:1800,width:320}).dxToast('instance').show(); }
function refreshInsights(){
  var unread = AppState.emails.filter(function(e){ return !e.isRead; }).length;
  var openDeals = AppState.deals.filter(function(d){ return d.stage !== 'Won' && d.stage !== 'Lost'; }).length;
  $('#unreadCount').text(unread);
  $('#openDealCount').text(openDeals);
  if($('#stageChart').length){ renderStageChart(); }
}
function renderEmailList(){
  var list = AppState.emails.filter(function(e){return e.folder===AppState.selectedFolder;});
  $('#emailList').dxList({
    dataSource:list,focusStateEnabled:true,height:'100%',
    noDataText:'No emails in this folder',
    itemTemplate:function(e){
      var deal=e.dealId?AppState.deals.find(function(d){return d.id===e.dealId}):null;
      return '<div class="email-item"><div class="email-top"><div class="email-from">'+(e.isRead?'':'<span class="unread-dot"></span>')+e.from+'</div><div class="email-date">'+(e.isStarred?'★ ':'')+e.date+'</div></div><div class="email-subject">'+e.subject+'</div><div class="email-snippet">'+e.snippet+'</div>'+(deal?'<div class="badge">'+deal.title+'</div>':'')+'</div>';
    },
    onItemClick:function(ev){AppState.selectEmail(ev.itemData.id);}
  });
}
function renderKanban(){
  var $k = $('#kanbanView').empty();
  var row = $('<div class="kanban-row"></div>').appendTo($k);
  AppState.pipelineStages.forEach(function(stage){
    var col = $('<div class="kanban-col"><div class="kanban-head">'+stage+'</div><div class="kanban-body" id="stage-'+stage+'"></div></div>');
    row.append(col);
    var deals = AppState.deals.filter(function(d){return d.stage===stage;});
    var body = col.find('.kanban-body');
    if(!deals.length){ body.append('<div class="empty-state">No deals</div>'); }
    deals.forEach(function(d){
      body.append('<div class="deal-card" data-id="'+d.id+'"><div>'+d.title+'</div><div style="font-size:12px;color:var(--text-secondary)">'+d.contact+'</div><div class="deal-value">£'+d.value.toLocaleString()+'</div></div>');
    });
    body.dxSortable({group:'deals',filter:'.deal-card',itemOrientation:'vertical',onAdd:function(e){
      AppState.moveDealToStage(Number($(e.itemElement).data('id')),stage); notify('Deal moved to '+stage); renderKanban(); refreshInsights();
    }});
  });
  $('.deal-card').on('click',function(){AppState.selectDeal(Number($(this).data('id')));});
}
function renderStageChart(){
  $('#stageChart').dxPieChart({
    dataSource:getStageSummary(),
    type:'doughnut',
    palette:'Soft',
    series:[{ argumentField:'stage', valueField:'count', label:{ visible:true, format:'fixedPoint' } }],
    legend:{ horizontalAlignment:'center', verticalAlignment:'bottom' },
    tooltip:{ enabled:true, customizeTooltip:function(point){ return { text: point.argumentText + ': ' + point.valueText + ' deals' }; } },
    size:{ height: 178 }
  });
}
function toggleTheme(){
  themeMode = themeMode === 'light' ? 'dark' : 'light';
  var vars = themeMode === 'dark'
    ? {'--bg-base':'#0d1117','--bg-surface':'#161b22','--bg-elevated':'#21262d','--bg-hover':'#30363d','--accent':'#00d4aa','--accent-dim':'#00d4aa33','--text-primary':'#e6edf3','--text-secondary':'#8b949e','--text-muted':'#484f58','--border':'#30363d','--border-subtle':'#21262d'}
    : {'--bg-base':'#f6f8fb','--bg-surface':'#ffffff','--bg-elevated':'#f8fafc','--bg-hover':'#eef2f7','--accent':'#0f766e','--accent-dim':'#0f766e1f','--text-primary':'#0f172a','--text-secondary':'#475569','--text-muted':'#94a3b8','--border':'#dbe3ee','--border-subtle':'#e7edf5'};
  Object.keys(vars).forEach(function(k){ document.documentElement.style.setProperty(k, vars[k]); });
  notify('Switched to ' + themeMode + ' mode');
}
function renderRightPanel(){
  var tabs = [{title:'Thread'},{title:'Deal'},{title:'Activity'},{title:'Insights'}];
  $('#detailTabs').dxTabPanel({
    dataSource:tabs,animationEnabled:false,swipeEnabled:false,
    itemTitleTemplate:function(i){ return i.title; },
    itemTemplate:function(item){
      if(AppState.rightPanelMode==='email'){
        var em = AppState.emails.find(function(e){return e.id===AppState.selectedEmailId;});
        if(!em){ return '<div class="empty-state">Select an email to view details.</div>'; }
        var deal = AppState.deals.find(function(d){return d.id===em.dealId;});
        if(item.title==='Thread') return '<div class="thread-wrap"><div class="thread-actions"><div id="replyBtn"></div><div id="replyAllBtn"></div><div id="forwardBtn"></div><div id="starBtn"></div><div id="archiveBtn"></div><div id="markReadToggleBtn"></div></div><div class="thread-meta"><div class="thread-meta-row"><strong>Subject</strong><span>'+em.subject+'</span></div><div class="thread-meta-row"><strong>From</strong><span>'+em.from+'</span></div><div class="thread-meta-row"><strong>To</strong><span>'+(em.to||'sales@pipemailer.local')+'</span></div><div class="thread-meta-row"><strong>CC</strong><span>'+(em.cc||'—')+'</span></div></div><div id="threadMessages"></div><div id="emailDealSelector" style="margin-top:10px"></div><div id="emailStageSelector" style="margin-top:10px"></div><div class="reply-composer"><div class="reply-title">Composer</div><div id="replyToField"></div><div id="replyCcField" style="margin-top:8px"></div><div id="replySubjectField" style="margin-top:8px"></div><div id="replyArea" style="margin-top:8px"></div><div id="sendReply" style="margin-top:10px"></div></div></div>';
        if(item.title==='Deal') return deal
          ?'<div style="padding:12px"><h3>'+deal.title+'</h3><p>'+deal.contact+'</p><p class="deal-value">£'+deal.value.toLocaleString()+'</p><p><strong>Stage:</strong> '+deal.stage+'</p></div>'
          :'<div class="empty-state">No linked deal. Use the Thread tab to align this email to a deal.</div>';
        if(item.title==='Activity') return deal?'<div style="padding:12px">'+deal.notes.map(function(n){return '<div class="thread-message">'+n+'</div>';}).join('')+'</div>':'<div class="empty-state">No activity.</div>';
        return '<div style="padding:12px"><div id="dealHealthGrid"></div><div id="dealActivityAccordion" style="margin-top:12px"></div></div>';
      }
      var dl = AppState.deals.find(function(d){return d.id===AppState.selectedDealId;});
      if(!dl){ return '<div class="empty-state">Select a deal from Kanban.</div>'; }
      if(item.title==='Thread') return '<div style="padding:12px">Deal: '+dl.title+'<br/>Stage: '+dl.stage+'</div>';
      if(item.title==='Deal') return '<div style="padding:12px"><h3>'+dl.title+'</h3><p>'+dl.contact+'</p><p class="deal-value">£'+dl.value.toLocaleString()+'</p><div id="addNoteBtn"></div></div>';
      if(item.title==='Activity') return '<div style="padding:12px">'+dl.notes.map(function(n){return '<div class="thread-message">'+n+'</div>';}).join('')+'</div>';
      return '<div style="padding:12px"><div id="dealHealthGrid"></div><div id="dealActivityAccordion" style="margin-top:12px"></div></div>';
    },
    onContentReady:function(){
      if($('#emailDealSelector').length){
        var selectedEmail = AppState.emails.find(function(e){return e.id===AppState.selectedEmailId;});
        $('#emailDealSelector').dxSelectBox({
          dataSource:AppState.deals,
          displayExpr:'title',
          valueExpr:'id',
          value:selectedEmail && selectedEmail.dealId ? selectedEmail.dealId : null,
          placeholder:'Align email to a deal',
          searchEnabled:true,
          label:'Aligned Deal',
          labelMode:'static',
          onValueChanged:function(ev){
            if(!selectedEmail){ return; }
            AppState.linkEmailToDeal(selectedEmail.id,ev.value||null);
            renderEmailList();
            renderRightPanel();
            notify(ev.value ? 'Email aligned to deal' : 'Email alignment removed');
          }
        });
      }
      if($('#emailStageSelector').length){
        var selectedEmailForStage = AppState.emails.find(function(e){return e.id===AppState.selectedEmailId;});
        var linkedDeal = selectedEmailForStage && selectedEmailForStage.dealId
          ? AppState.deals.find(function(d){return d.id===selectedEmailForStage.dealId;})
          : null;
        $('#emailStageSelector').dxSelectBox({
          dataSource:AppState.pipelineStages,
          value:linkedDeal?linkedDeal.stage:null,
          placeholder:linkedDeal?'Set deal stage':'Align this email to a deal first',
          disabled:!linkedDeal,
          label:'Deal Stage for this Email',
          labelMode:'static',
          onValueChanged:function(ev){
            if(!selectedEmailForStage || !ev.value){ return; }
            var updated = AppState.updateEmailDealStage(selectedEmailForStage.id,ev.value);
            if(updated){
              refreshInsights();
              renderKanban();
              renderEmailList();
              notify('Deal stage updated to '+ev.value);
            }
          }
        });
      }
      if($('#replyArea').length){
        var activeEmail = AppState.emails.find(function(e){return e.id===AppState.selectedEmailId;});
        var composerMode = AppState.composerMode || 'reply';
        var toValue = composerMode==='forward' ? '' : (activeEmail ? activeEmail.from : '');
        var ccValue = composerMode==='replyAll' ? (activeEmail && activeEmail.cc ? activeEmail.cc : 'team@pipemailer.local') : '';
        var subjectValue = activeEmail ? ((composerMode==='forward' ? 'Fwd: ' : 'Re: ') + activeEmail.subject.replace(/^Re:\s|^Fwd:\s/i,'')) : '';
        var bodyPrefill = composerMode==='forward'
          ? '\n\n---- Forwarded message ----\n' + (activeEmail ? activeEmail.body : '')
          : '';
        var threadItems = (activeEmail.thread && activeEmail.thread.length ? activeEmail.thread : [{from:activeEmail.from,at:activeEmail.date,body:activeEmail.body}]).map(function(msg){
          return '<div class="thread-message"><div class="thread-message-head"><strong>'+msg.from+'</strong><span>'+msg.at+'</span></div><div>'+msg.body+'</div></div>';
        }).join('');
        $('#threadMessages').html(threadItems);
        $('#replyToField').dxTextBox({value:toValue,label:'To',labelMode:'static',placeholder:'Recipient'});
        $('#replyCcField').dxTextBox({value:ccValue,label:'CC',labelMode:'static',placeholder:'Optional CC'});
        $('#replySubjectField').dxTextBox({value:subjectValue,label:'Subject',labelMode:'static',placeholder:'Subject'});
        $('#replyArea').dxTextArea({height:110,placeholder:'Write your message...',value:bodyPrefill});
        $('#sendReply').dxButton({text:composerMode==='forward'?'Send Forward':'Send',type:'success',onClick:function(e){
          e.component.option('disabled',true);
          setTimeout(function(){notify('Message sent');e.component.option('disabled',false);},700);
        }});
        $('#replyBtn').dxButton({text:'Reply',icon:'revert',stylingMode:'outlined',onClick:function(){AppState.composerMode='reply';renderRightPanel();}});
        $('#replyAllBtn').dxButton({text:'Reply all',icon:'group',stylingMode:'outlined',onClick:function(){AppState.composerMode='replyAll';renderRightPanel();}});
        $('#forwardBtn').dxButton({text:'Forward',icon:'redo',stylingMode:'outlined',onClick:function(){AppState.composerMode='forward';renderRightPanel();}});
        $('#starBtn').dxButton({text:activeEmail && activeEmail.isStarred?'Unstar':'Star',icon:activeEmail && activeEmail.isStarred?'favorites':'favorite',stylingMode:'outlined',onClick:function(){
          var starred = AppState.toggleEmailStar(activeEmail.id);
          renderEmailList();
          renderRightPanel();
          notify(starred?'Email starred':'Star removed');
        }});
        $('#archiveBtn').dxButton({text:'Archive',icon:'folder',stylingMode:'outlined',onClick:function(){
          AppState.archiveEmail(activeEmail.id);
          AppState.selectedEmailId = null;
          renderEmailList();
          renderRightPanel();
          refreshInsights();
          notify('Email archived');
        }});
        $('#markReadToggleBtn').dxButton({text:activeEmail && activeEmail.isRead?'Mark unread':'Mark read',icon:'email',stylingMode:'outlined',onClick:function(){
          var nextIsRead = !activeEmail.isRead;
          AppState.markEmailRead(activeEmail.id,nextIsRead);
          renderEmailList();
          renderRightPanel();
          refreshInsights();
          notify(nextIsRead?'Marked read':'Marked unread');
        }});
      }
      if($('#addNoteBtn').length){
        $('#addNoteBtn').dxButton({text:'Add note',onClick:function(){$('#notePopup').dxPopup('instance').show();}});
      }
      if($('#dealHealthGrid').length){
        $('#dealHealthGrid').dxDataGrid({
          dataSource:getDealHealthRows(),
          keyExpr:'id',
          showBorders:true,
          rowAlternationEnabled:true,
          paging:{ pageSize:5 },
          searchPanel:{ visible:true, width:220, placeholder:'Search deals...' },
          columns:[
            { dataField:'title', caption:'Deal' },
            { dataField:'stage', width:100 },
            { dataField:'value', caption:'Value', dataType:'number', format:{ type:'currency', currency:'GBP', precision:0 } },
            { dataField:'probability', caption:'Win %', width:90 },
            { dataField:'velocity', caption:'Velocity', width:100 }
          ],
          masterDetail:{
            enabled:true,
            template:function(container, options){
              var notes = (options.data.notes||[]).map(function(n){ return '<div class="thread-message">'+n+'</div>'; }).join('') || '<div class="empty-state">No notes</div>';
              container.append('<div style="padding:8px 0"><strong>Latest notes</strong>'+notes+'</div>');
            }
          },
          onRowClick:function(ev){ AppState.selectDeal(ev.data.id); }
        });
      }
      if($('#dealActivityAccordion').length){
        var summary = getStageSummary().map(function(s){
          return { title:s.stage + ' ('+s.count+')', text:'Pipeline value: £' + s.value.toLocaleString() };
        });
        $('#dealActivityAccordion').dxAccordion({
          dataSource:summary,
          multiple:true,
          collapsible:true,
          itemTitleTemplate:function(item){ return item.title; },
          itemTemplate:function(item){ return '<div style="padding:8px">'+item.text+'</div>'; }
        });
      }
    }
  });
  var title = AppState.rightPanelMode==='email' ? (AppState.emails.find(function(e){return e.id===AppState.selectedEmailId;})||{}).subject : (AppState.deals.find(function(d){return d.id===AppState.selectedDealId;})||{}).title;
  $('#detailTitle').text(title||'No item selected');
}
$(function(){
  $('#searchBox').dxTextBox({placeholder:'Search emails and deals...',mode:'search',onValueChanged:function(e){
    var q = (e.value||'').toLowerCase(); if(!q){return;}
    var emails = AppState.emails.filter(function(x){return (x.subject+x.from).toLowerCase().indexOf(q)>-1;});
    var deals = AppState.deals.filter(function(x){return x.title.toLowerCase().indexOf(q)>-1;});
    $('#searchPopup').dxPopup({title:'Search Results',width:560,height:420,contentTemplate:function(c){
      c.append('<div style="padding:12px"><h4>Emails</h4>'+ (emails.map(function(x){return '<div class="thread-message">'+x.subject+'</div>';}).join('')||'<div class="empty-state">No emails</div>') +'<h4>Deals</h4>'+ (deals.map(function(x){return '<div class="thread-message">'+x.title+'</div>';}).join('')||'<div class="empty-state">No deals</div>') +'</div>');
    }}).dxPopup('instance').show();
  }});
  $('#composeBtn').dxButton({text:'Compose',type:'success',onClick:function(){$('#composePopup').dxPopup('instance').show();}});
  $('#themeBtn').dxButton({text:'Theme',icon:'contrast',stylingMode:'outlined',onClick:toggleTheme});
  $('#notifBtn').dxButton({icon:'bell',hint:'Notifications'});
  $('#emailViewBtn').dxButton({text:'Email View',stylingMode:'outlined',onClick:function(){AppState.currentView='email';$('#emailListContainer').show();$('#kanbanView').hide();}});
  $('#pipelineViewBtn').dxButton({text:'Pipeline View',stylingMode:'outlined',onClick:function(){AppState.currentView='pipeline';$('#emailListContainer').hide();$('#kanbanView').show();renderKanban();}});
  $('#folders').dxList({dataSource:[{name:'Inbox',id:'inbox'},{name:'Sent',id:'sent'},{name:'Drafts',id:'drafts'},{name:'Archive',id:'archive'}],height:176,itemTemplate:function(i){
    var count = AppState.emails.filter(function(e){return e.folder===i.id;}).length; return '<div>'+i.name+' <span style="color:var(--text-secondary)">('+count+')</span></div>';},onItemClick:function(e){AppState.selectedFolder=e.itemData.id;renderEmailList();}});
  $('#pipelineStages').dxList({dataSource:AppState.pipelineStages,height:200,itemTemplate:function(s){var c=AppState.deals.filter(function(d){return d.stage===s;}).length;return '<div>'+s+' <span style="color:var(--text-secondary)">('+c+')</span></div>';},onItemClick:function(e){AppState.currentView='pipeline';$('#emailListContainer').hide();$('#kanbanView').show();renderKanban();}});
  $('#markReadBtn').dxButton({text:'Mark inbox read',stylingMode:'outlined',onClick:function(){
    AppState.emails.forEach(function(e){ if(e.folder==='inbox'){ e.isRead = true; }});
    renderEmailList();
    refreshInsights();
    notify('Inbox marked as read');
  }});
  $('#newDealBtn').dxButton({text:'Quick add deal',stylingMode:'outlined',onClick:function(){
    $('#dealPopup').dxPopup('instance').show();
  }});
  $('#composePopup').dxPopup({title:'Compose Email',width:560,height:430,showCloseButton:true,contentTemplate:function(c){
    c.append('<div id="toField"></div><div id="subField" style="margin-top:10px"></div><div id="bodyField" style="margin-top:10px"></div><div id="linkDeal" style="margin-top:10px"></div><div id="sendBtn" style="margin-top:12px"></div>');
    $('#toField').dxTextBox({placeholder:'To'}); $('#subField').dxTextBox({placeholder:'Subject'}); $('#bodyField').dxTextArea({height:140,placeholder:'Message'});
    $('#linkDeal').dxSelectBox({dataSource:AppState.deals,displayExpr:'title',valueExpr:'id',placeholder:'Link to deal (optional)'});
    $('#sendBtn').dxButton({text:'Send',type:'success',onClick:function(e){e.component.option('disabled',true);setTimeout(function(){notify('Email sent');$('#composePopup').dxPopup('instance').hide();e.component.option('disabled',false);},700);}});
  }});
  $('#notePopup').dxPopup({title:'Add deal note',width:420,height:280,showCloseButton:true,contentTemplate:function(c){
    c.append('<div id="noteArea"></div><div id="saveNote" style="margin-top:10px"></div>');
    $('#noteArea').dxTextArea({height:120,placeholder:'Write note'});
    $('#saveNote').dxButton({text:'Save note',type:'success',onClick:function(e){
      var note = $('#noteArea').dxTextArea('instance').option('value');
      if(AppState.selectedDealId && note){e.component.option('disabled',true);setTimeout(function(){AppState.addDealNote(AppState.selectedDealId,note);notify('Note saved');$('#notePopup').dxPopup('instance').hide();renderRightPanel();e.component.option('disabled',false);},700);}
    }});
  }});
  $('#dealPopup').dxPopup({title:'Create deal',width:520,height:470,showCloseButton:true,contentTemplate:function(c){
    c.append('<div id="dealForm"></div><div id="saveDeal" style="margin-top:10px"></div>');
    var formData = { title:'', contact:'', value:15000, stage:'Leads', probability:25, tags:[] };
    $('#dealForm').dxForm({
      formData:formData,
      labelMode:'floating',
      items:[
        { dataField:'title', editorType:'dxTextBox', isRequired:true },
        { dataField:'contact', editorType:'dxTextBox', isRequired:true },
        { dataField:'value', editorType:'dxNumberBox', editorOptions:{ min:1000, format:'#,##0' } },
        { dataField:'stage', editorType:'dxSelectBox', editorOptions:{ dataSource:AppState.pipelineStages } },
        { dataField:'probability', editorType:'dxSlider', editorOptions:{ min:5, max:100, showRange:true } },
        { dataField:'tags', editorType:'dxTagBox', editorOptions:{ dataSource:['Expansion','Renewal','Risk','Urgent','Legal'], showSelectionControls:true } }
      ]
    });
    $('#saveDeal').dxButton({text:'Save deal',type:'success',onClick:function(e){
      var form = $('#dealForm').dxForm('instance');
      var data = form.option('formData');
      if(!data.title || !data.contact){ notify('Deal title and contact are required','warning'); return; }
      e.component.option('disabled',true);
      setTimeout(function(){
        var newId = Date.now();
        AppState.deals.unshift({
          id:newId,title:data.title,contact:data.contact,value:Number(data.value)||10000,stage:data.stage||'Leads',
          probability:Number(data.probability)||20,days:1,notes:['Deal created from quick action','Tags: '+((data.tags||[]).join(', ')||'none')]
        });
        refreshInsights();
        renderKanban();
        renderStageChart();
        renderRightPanel();
        $('#dealPopup').dxPopup('instance').hide();
        notify('New deal added');
        e.component.option('disabled',false);
      },500);
    }});
  }});
  $('#linkBtn').dxButton({text:'Link Email',stylingMode:'text',onClick:function(){ $('#composePopup').dxPopup('instance').show(); }});
  renderEmailList();
  renderRightPanel();
  refreshInsights();
  renderStageChart();
});
</script>
</body>
</html>
